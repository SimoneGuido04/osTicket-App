<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#128c7e",
                        "background-light": "#f6f8f8",
                        "background-dark": "#11211f",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>osTicket Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Header -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">osTicket</h2>
</div>
<!-- Hero / Logo Section -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3 flex justify-center">
<div class="w-full max-w-sm aspect-video bg-center bg-no-repeat bg-contain flex flex-col justify-end overflow-hidden @[480px]:rounded-lg" data-alt="Professional abstract corporate help desk logo" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBkbJGUoovkwtI_0b8I9lvE5O96CLta4kkGgOJPLyAbzORFZBsXHjfTD-bfMn4PbJJouxxTNdmMlgqAvjXqsCzkKowgdWHGXhAdns35EnBIK9aTjMaf3elfJ9jRscqMeBICq3xiP9INmA4F0tamMWtDNsWmDik3EuaTqLF3yqYrhitbtd5B7WXS2RUT6ykOn-K50vmWOC0pi2ol_R8o5LTUVQE3-bSE6V8CHY1XNc-aNXeCzrTzwB_MN0Qb2XDzaWmNkRoKeiaQKZY");'>
</div>
</div>
</div>
<!-- Welcome Text -->
<div class="px-6">
<h2 class="text-slate-900 dark:text-slate-100 tracking-light text-[28px] font-bold leading-tight text-center pb-2 pt-8">Welcome Back</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-6 text-center">Log in to your help desk account to continue</p>
</div>
<!-- Login Form -->
<div class="flex flex-col gap-4 px-6 py-3 max-w-[480px] mx-auto w-full">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Username or Email</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-slate-800/50 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 p-[15px] pl-12 text-base font-normal" placeholder="Enter your username" type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Password</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-slate-800/50 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 p-[15px] pl-12 text-base font-normal" placeholder="Enter your password" type="password"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
</div>
</label>
<div class="flex justify-end">
<a class="text-primary text-sm font-semibold hover:underline" href="#">Forgot password?</a>
</div>
<button class="mt-4 w-full h-14 bg-primary text-white rounded-xl font-bold text-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
            Secure Login
            <span class="material-symbols-outlined">login</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center px-6 py-6 max-w-[480px] mx-auto w-full">
<div class="flex-1 border-t border-primary/10"></div>
<span class="px-4 text-slate-400 text-sm font-medium">OR CONTINUE WITH</span>
<div class="flex-1 border-t border-primary/10"></div>
</div>
<!-- SSO Options -->
<div class="flex flex-col gap-3 px-6 pb-12 max-w-[480px] mx-auto w-full">
<button class="flex items-center justify-center gap-3 w-full h-12 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-semibold hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined text-primary">hub</span>
            SSO (OAuth / LDAP)
        </button>
<button class="flex items-center justify-center gap-3 w-full h-12 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-semibold hover:bg-slate-50 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
            Google Workspace
        </button>
</div>
<!-- Footer Area -->
<div class="mt-auto p-6 text-center">
<p class="text-slate-400 text-xs">
            Powered by osTicket © 2024<br/>
            All rights reserved.
        </p>
</div>
</div>
</body></html>
